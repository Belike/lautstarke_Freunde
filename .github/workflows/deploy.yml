name: Deploy to GitHub Pages

# Publishes the Astro site from the `code/` subdirectory to GitHub Pages.
# Runs on push to `main` or manually via workflow_dispatch.
#
# ONE-TIME SETUP (done by Norma in the GitHub UI, not by this workflow):
#   Repo → Settings → Pages → Source → "GitHub Actions"
#
# Release gate: before the first production deploy, qa-tester ("QA passed")
# and legal ("Go") must give the green light (see orchestrator / CLAUDE.md).
#
# Security: only the compiled dist/ artifact is deployed — source, book
# content, and all private files never reach the Pages environment.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Prevent overlapping deploys; do not cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: code/package-lock.json

      - name: Install dependencies
        working-directory: code
        run: npm ci

      - name: Build Astro site
        working-directory: code
        run: npm run build

      - name: Configure Pages (enables GitHub Actions source if not yet set)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: code/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
